<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cozmo Eye Builder V16 - JSON Import</title>
    <style>
        :root {
            --bg: #0b0d11; --panel: #161920; --accent: #00e5ff;
            --text: #e2e8f0; --dim: #64748b; --border: #2d333f;
            --mono: 'JetBrains Mono', monospace;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; }
        .root { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; max-width: 1100px; }
        .screen-box { background: #000; padding: 12px; border-radius: 20px; border: 3px solid #1a1a1a; box-shadow: 0 0 30px rgba(0, 229, 255, 0.1); }
        canvas { display: block; border-radius: 8px; }
        .lbl { font-size: 16px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; width: 100%; background: var(--panel); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .btn { padding: 5px; border-radius: 4px; border: 1px solid var(--border); background: #1e252e; cursor: pointer; font-size: 9px; color: var(--dim); transition: 0.1s; text-align: center;}
        .btn.on { border-color: var(--accent); background: rgba(0, 229, 255, 0.1); color: var(--accent); }
        .row { display: flex; gap: 15px; width: 100%; }
        .panel { flex: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .ptitle { font-size: 11px; font-weight: 800; color: var(--accent); text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 5px; margin-bottom: 5px; }
        .sr { display: flex; align-items: center; gap: 10px; }
        .sr label { font-size: 9px; color: var(--dim); width: 65px; text-transform: uppercase; }
        input[type=range] { flex: 1; height: 3px; background: #334155; appearance: none; outline: none; border-radius: 2px; }
        input[type=range]::-webkit-slider-thumb { appearance: none; width: 10px; height: 10px; background: var(--accent); border-radius: 50%; cursor: pointer; }
        .sr span { font-size: 9px; font-family: var(--mono); color: var(--accent); width: 35px; text-align: right; }
        .footer { width: 100%; display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 12px; border-radius: 10px; border: 1px solid var(--border); }
        .code { font-family: var(--mono); font-size: 10px; background: #000; border: 1px solid var(--border); border-radius: 6px; padding: 15px; color: #4ade80; width: 100%; white-space: pre; overflow-x: auto; line-height: 1.6; }
        .cpbtn { background: #1e252e; color: var(--text); border: 1px solid var(--border); padding: 6px 12px; border-radius: 5px; font-size: 10px; font-weight: 600; cursor: pointer; }
        .cpbtn:hover { border-color: var(--accent); color: var(--accent); }
        #status-save { font-size: 10px; color: #4ade80; opacity: 0; transition: 0.5s; }
		.screen-box {
			position: relative;
			overflow: hidden;
		}
		.screen-box::after {
			content: "";
			position: absolute;
			top: 12px; left: 12px; right: 12px; bottom: 12px;
			background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
						linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
			background-size: 100% 2px, 3px 100%; /* Simula a máscara do LCD */
			pointer-events: none;
			border-radius: 8px;
		}
    </style>
</head>
<body>

<div class="root">
    <div class="screen-box"><canvas id="c" width="320" height="240"></canvas></div>
    <div style="display:flex; align-items:center; gap:15px;">
        <div class="lbl" id="lbl">Neutral</div>
        <div id="status-save">● SALVO</div>
    </div>
    <div class="grid" id="btns"></div>

    <div class="row">
        <div class="panel">
            <div class="ptitle">Olho Esquerdo</div>
            <div class="sr"><label>topo-esq</label><input type="range" id="ltl" min="-30" max="30" value="0"><span id="vltl">0</span></div>
            <div class="sr"><label>topo-dir</label><input type="range" id="ltr" min="-30" max="30" value="0"><span id="vltr">0</span></div>
            <div class="sr"><label>fund-esq</label><input type="range" id="lbl2" min="-30" max="30" value="0"><span id="vlbl">0</span></div>
            <div class="sr"><label>fund-dir</label><input type="range" id="lbr" min="-30" max="30" value="0"><span id="vlbr">0</span></div>
            <div class="sr"><label>abertura</label><input type="range" id="lop" min="5" max="100" value="100"><span id="vllop">1.00</span></div>
            <div class="sr"><label>pos-Y</label><input type="range" id="lyy" min="-40" max="40" value="0"><span id="vlyy">0</span></div>
        </div>

        <div class="panel" style="flex: 0.8; background: rgba(0, 229, 255, 0.02);">
            <div class="ptitle">Config. Global</div>
            <div class="sr"><label>distância</label><input type="range" id="gdi" min="60" max="220" value="128"><span id="vgdi">128</span></div>
            <div class="sr"><label>r-topo</label><input type="range" id="grt" min="4" max="36" value="20"><span id="vgrt">20</span></div>
            <div class="sr"><label>r-fundo</label><input type="range" id="grb" min="4" max="36" value="20"><span id="vgrb">20</span></div>
            <div class="sr"><label>cv-topo</label><input type="range" id="gct" min="-30" max="30" value="0"><span id="vgct">0</span></div>
            <div class="sr"><label>cv-fund</label><input type="range" id="gcb" min="-30" max="30" value="0"><span id="vgcb">0</span></div>
            <div style="margin-top:5px; border-top: 1px solid var(--border); padding-top:10px;">
                <div class="sr"><label>trans(ms)</label><input type="range" id="gms" min="0" max="3000" step="50" value="500"><span id="vgms">500</span></div>
                <div class="sr"><label>priorid</label><input type="range" id="gpr" min="0" max="255" value="0"><span id="vgpr">0</span></div>
            </div>
        </div>

        <div class="panel">
            <div class="ptitle">Olho Direito</div>
            <div class="sr"><label>topo-esq</label><input type="range" id="rtl" min="-30" max="30" value="0"><span id="vrtl">0</span></div>
            <div class="sr"><label>topo-dir</label><input type="range" id="rtr" min="-30" max="30" value="0"><span id="vrtr">0</span></div>
            <div class="sr"><label>fund-esq</label><input type="range" id="rbl" min="-30" max="30" value="0"><span id="vrbl">0</span></div>
            <div class="sr"><label>fund-dir</label><input type="range" id="rbr" min="-30" max="30" value="0"><span id="vrbr">0</span></div>
            <div class="sr"><label>abertura</label><input type="range" id="rop" min="5" max="100" value="100"><span id="vlrop">1.00</span></div>
            <div class="sr"><label>pos-Y</label><input type="range" id="ryy" min="-40" max="40" value="0"><span id="vryy">0</span></div>
        </div>
    </div>

    <div class="footer">
        <label style="font-size:10px; color:var(--dim); cursor:pointer">
            <input type="checkbox" id="sync" checked> Modo Espelho (Live)
        </label>
        <div style="display:flex; gap:8px;">
            <button class="cpbtn" onclick="copyLeftToRight()">Mirror Esq ➔ Dir</button>
            <input type="file" id="importFile" style="display:none" onchange="importJSON(event)">
            <button class="cpbtn" onclick="document.getElementById('importFile').click()">Carregar JSON</button>
            <button class="cpbtn" onclick="exportFullJSON()">Baixar Backup</button>
            <button class="cpbtn" onclick="resetAll()">Resetar Tudo</button>
            <button class="cpbtn" style="background:var(--accent); color:#000;" onclick="copyCode()">Copiar C++</button>
        </div>
    </div>
    <div class="code" id="codeout"></div>
</div>

<script>
const EW=82, EH=78, EY=120, CYN='#00e5ff';
let activeIdx = 0;
const DB_KEY = 'cozmo_eyes_V16_FINAL';

// VALORES ATUALIZADOS COM O SEU ÚLTIMO BACKUP
const INITIAL_EXPRS = [
  {"n": "Neutral", "pL": {"tl": 0, "tr": 0, "bl": 0, "br": 0, "op": 1, "y": 0}, "pR": {"tl": 0, "tr": 0, "bl": 0, "br": 0, "op": 1, "y": 0}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 3, "cb": 3, "ms": 500, "pr": 0}},

  {"n": "Blink lo", "pL": {"tl": 28, "tr": 28, "bl": 0, "br": 0, "op": 0.1, "y": 18}, "pR": {"tl": 28, "tr": 28, "bl": 0, "br": 0, "op": 0.1, "y": 18}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 0, "cb": 0, "ms": 100, "pr": 1}},
  {"n": "Sad down", "pL": {"tl": 18, "tr": -22, "bl": -8, "br": -5, "op": 0.62, "y": 40}, "pR": {"tl": -22, "tr": 18, "bl": -5, "br": -8, "op": 0.62, "y": 40}, "g": {"di": 128, "rt": 10, "rb": 10, "ct": -8, "cb": -7, "ms": 600, "pr": 0}},
  {"n": "Sad up", "pL": {"tl": 30, "tr": -10, "bl": 0, "br": -9, "op": 0.72, "y": -8}, "pR": {"tl": -10, "tr": 30, "bl": -9, "br": 0, "op": 0.72, "y": -8}, "g": {"di": 128, "rt": 4, "rb": 4, "ct": 4, "cb": -11, "ms": 600, "pr": 0}},
  {"n": "Worried", "pL": {"tl": -12, "tr": -30, "bl": 2, "br": 0, "op": 0.84, "y": 0}, "pR": {"tl": -30, "tr": -12, "bl": 0, "br": 2, "op": 0.84, "y": 0}, "g": {"di": 128, "rt": 13, "rb": 19, "ct": 6, "cb": 0, "ms": 500, "pr": 0}},
  {"n": "Focused", "pL": {"tl": 10, "tr": 10, "bl": 6, "br": 6, "op": 0.44, "y": 0}, "pR": {"tl": 10, "tr": 10, "bl": 6, "br": 6, "op": 0.44, "y": 0}, "g": {"di": 128, "rt": 14, "rb": 4, "ct": 0, "cb": -11, "ms": 350, "pr": 0}},
  {"n": "Annoyed", "pL": {"tl": 10, "tr": 22, "bl": 8, "br": 8, "op": 0.5, "y": 6}, "pR": {"tl": 22, "tr": 10, "bl": 8, "br": 8, "op": 0.6, "y": 0}, "g": {"di": 128, "rt": 14, "rb": 14, "ct": 4, "cb": -4, "ms": 400, "pr": 0}},
  {"n": "Surprised", "pL": {"tl": -22, "tr": -22, "bl": -10, "br": -10, "op": 1, "y": 0}, "pR": {"tl": -22, "tr": -22, "bl": -10, "br": -10, "op": 1, "y": 0}, "g": {"di": 128, "rt": 25, "rb": 25, "ct": 3, "cb": 4, "ms": 250, "pr": 0}},
  {"n": "Skeptic", "pL": {"tl": 0, "tr": 0, "bl": 4, "br": 4, "op": 1, "y": 0}, "pR": {"tl": 19, "tr": 0, "bl": 10, "br": 10, "op": 0.69, "y": 8}, "g": {"di": 128, "rt": 4, "rb": 20, "ct": 3, "cb": 3, "ms": 500, "pr": 0}},
  {"n": "Frus/Bored", "pL": {"tl": 24, "tr": 13, "bl": 12, "br": 12, "op": 0.46, "y": 40}, "pR": {"tl": 13, "tr": 24, "bl": 12, "br": 12, "op": 0.46, "y": 40}, "g": {"di": 128, "rt": 4, "rb": 17, "ct": 0, "cb": 0, "ms": 600, "pr": 0}},

  {"n": "Sleepy", "pL": {"tl": 30, "tr": 19, "bl": 15, "br": 5, "op": 0.3, "y": 0}, "pR": {"tl": 19, "tr": 30, "bl": 5, "br": 15, "op": 0.66, "y": -14}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 0, "cb": 0, "ms": 800, "pr": 0}},
  {"n": "Suspicious", "pL": {"tl": 10, "tr": 24, "bl": 6, "br": 6, "op": 0.56}, "pR": {"tl": 24, "tr": 10, "bl": 6, "br": 6, "op": 0.56}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 0, "cb": 0, "ms": 450, "pr": 0}},
  {"n": "Squint", "pL": {"tl": 20, "tr": 20, "bl": 20, "br": 20, "op": 0.24}, "pR": {"tl": 20, "tr": 20, "bl": 20, "br": 20, "op": 0.24}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 0, "cb": 0, "ms": 400, "pr": 0}},
  {"n": "Angry", "pL": {"tl": -26, "tr": 26, "bl": 0, "br": 0, "op": 0.86}, "pR": {"tl": 26, "tr": -26, "bl": 0, "br": 0, "op": 0.86}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 10, "cb": 0, "ms": 400, "pr": 0}},
  {"n": "Furious", "pL": {"tl": -32, "tr": 32, "bl": 0, "br": 8, "op": 0.78}, "pR": {"tl": 32, "tr": -32, "bl": 0, "br": 8, "op": 0.78}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 15, "cb": 5, "ms": 300, "pr": 0}},
  {"n": "Scared", "pL": {"tl": -12, "tr": -8, "bl": -6, "br": -10, "op": 0.94}, "pR": {"tl": -8, "tr": -12, "bl": -10, "br": -6, "op": 0.94}, "g": {"di": 128, "rt": 20, "rb": 20, "ct": 0, "cb": 0, "ms": 200, "pr": 0}},
  {"n": "Awe", "pL": {"tl": -12, "tr": -12, "bl": -12, "br": -12, "op": 1}, "pR": {"tl": -12, "tr": -12, "bl": -12, "br": -12, "op": 1}, "g": {"di": 128, "rt": 36, "rb": 36, "ct": -12, "cb": 12, "ms": 500, "pr": 0}}
];

let EXPRS = JSON.parse(localStorage.getItem(DB_KEY)) || INITIAL_EXPRS;

function drawEye(ctx,cx,cy,p,g){
  const h=Math.max(4, EH*(p.op||1)), w=EW, y0=cy-h/2+(p.y||0), y1=cy+h/2+(p.y||0);
  const sc=(p.op||1), otl=(p.tl||0)*sc, otr=(p.tr||0)*sc, obl=(p.bl||0)*sc, obr=(p.br||0)*sc;
  const rt=Math.min(g.rt||20, h*0.45, w*0.45), rb=Math.min(g.rb||20, h*0.45, w*0.45);
  ctx.beginPath();
  ctx.moveTo(cx-w/2+rt, y0+otl);
  ctx.quadraticCurveTo(cx, y0+(otl+otr)/2-(g.ct||0), cx+w/2-rt, y0+otr);
  ctx.arcTo(cx+w/2, y0+otr, cx+w/2, y0+otr+rt, rt);
  ctx.lineTo(cx+w/2, y1+obr-rb);
  ctx.arcTo(cx+w/2, y1+obr, cx+w/2-rb, y1+obr, rb);
  ctx.quadraticCurveTo(cx, y1+(obl+obr)/2+(g.cb||0), cx-w/2+rb, y1+obl);
  ctx.arcTo(cx-w/2, y1+obl, cx-w/2, y1+obl-rb, rb);
  ctx.lineTo(cx-w/2, y0+otl+rt);
  ctx.arcTo(cx-w/2, y0+otl, cx-w/2+rt, y0+otl, rt);
  ctx.closePath();
  ctx.save(); 
  ctx.fillStyle=CYN; ctx.fill(); ctx.restore();
}

function render(){
  const d = readSliders();
  const ctx = document.getElementById('c').getContext('2d');
  ctx.clearRect(0,0,320,240);
  ctx.fillStyle='#000'; ctx.fillRect(0,0,320,240);
  const centerX_L = 160 - (d.g.di / 2), centerX_R = 160 + (d.g.di / 2);
  drawEye(ctx, centerX_L, EY, d.pL, d.g); drawEye(ctx, centerX_R, EY, d.pR, d.g);
  updateCode(d);
  EXPRS[activeIdx].pL = d.pL; EXPRS[activeIdx].pR = d.pR; EXPRS[activeIdx].g = d.g;
  localStorage.setItem(DB_KEY, JSON.stringify(EXPRS));
  localStorage.setItem(DB_KEY + '_idx', activeIdx);
  const st = document.getElementById('status-save'); st.style.opacity = "1";
  setTimeout(() => { st.style.opacity = "0"; }, 800);
}

function readSliders(){
  const g=(id)=>parseFloat(document.getElementById(id).value)||0;
  return {
    pL:{tl:g('ltl'),tr:g('ltr'),bl:g('lbl2'),br:g('lbr'),op:g('lop')/100,y:g('lyy')},
    pR:{tl:g('rtl'),tr:g('rtr'),bl:g('rbl'),br:g('rbr'),op:g('rop')/100,y:g('ryy')},
    g: {di:g('gdi'),rt:g('grt'),rb:g('grb'),ct:g('gct'),cb:g('gcb'),ms:g('gms'),pr:g('gpr')}
  };
}

function updateCode(d){
  const code = [d.pL.tl, d.pL.tr, d.pL.bl, d.pL.br, d.pR.tl, d.pR.tr, d.pR.bl, d.pR.br, d.pL.op.toFixed(2)+'f', d.pR.op.toFixed(2)+'f', d.pL.y, d.pR.y, d.g.rt, d.g.rb, d.g.ct, d.g.cb, "FACE_EYE_COLOR", d.g.ms, d.g.pr].join(', ');
  document.getElementById('codeout').textContent = `{ ${code} }`;
}

function updateUI(data){
  const s=(id,v)=>{ const el=document.getElementById(id); if(el) el.value=v; };
  const v=(id,val)=>{ const el=document.getElementById('v'+id); if(el) el.textContent=(id.includes('op'))?val.toFixed(2):val; };
  s('ltl',data.pL.tl); v('ltl',data.pL.tl); s('ltr',data.pL.tr); v('ltr',data.pL.tr);
  s('lbl2',data.pL.bl); v('lbl2',data.pL.bl); s('lbr',data.pL.br); v('lbr',data.pL.br);
  s('lop',data.pL.op*100); v('lop',data.pL.op); s('lyy',data.pL.y); v('lyy',data.pL.y);
  s('rtl',data.pR.tl); v('rtl',data.pR.tl); s('rtr',data.pR.tr); v('rtr',data.pR.tr);
  s('rbl',data.pR.bl); v('rbl',data.pR.bl); s('rbr',data.pR.br); v('rbr',data.pR.br);
  s('rop',data.pR.op*100); v('rop',data.pR.op); s('ryy',data.pR.y); v('ryy',data.pR.y);
  s('gdi',data.g.di); v('gdi',data.g.di); s('grt',data.g.rt); v('grt',data.g.rt); 
  s('grb',data.g.rb); v('grb',data.g.rb); s('gct',data.g.ct); v('gct',data.g.ct); 
  s('gcb',data.g.cb); v('gcb',data.g.cb); s('gms',data.g.ms); v('gms',data.g.ms); 
  s('gpr',data.g.pr); v('gpr',data.g.pr);
}

function select(i){
  activeIdx = i; document.getElementById('lbl').textContent = EXPRS[i].n;
  document.querySelectorAll('.btn').forEach((b,idx)=>b.classList.toggle('on', idx===i));
  updateUI(EXPRS[i]); render();
}

function copyLeftToRight() {
  const d = readSliders(); d.pR = JSON.parse(JSON.stringify(d.pL));
  let tmp=d.pR.tl; d.pR.tl=d.pR.tr; d.pR.tr=tmp; tmp=d.pR.bl; d.pR.bl=d.pR.br; d.pR.br=tmp;
  updateUI(d); render();
}

function resetAll() { if(confirm("Apagar ajustes?")) { localStorage.removeItem(DB_KEY); location.reload(); } }

function exportFullJSON() {
  const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(EXPRS, null, 2));
  const a = document.createElement('a'); a.href = dataStr; a.download = "backup_olhos.json"; a.click();
}

// NOVO: CARREGAR JSON
function importJSON(event) {
    const file = event.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const imported = JSON.parse(e.target.result);
            if (Array.isArray(imported)) {
                EXPRS = imported; localStorage.setItem(DB_KEY, JSON.stringify(EXPRS));
                location.reload();
            } else alert("JSON Inválido!");
        } catch(err) { alert("Erro ao ler arquivo."); }
    };
    reader.readAsText(file);
}

document.querySelectorAll('input[type=range]').forEach(el => {
  el.oninput = () => {
    if(document.getElementById('sync').checked && el.id.startsWith('l')){
       const d = readSliders(); const k=el.id.slice(1);
       if(k==='tl') d.pR.tr=d.pL.tl; else if(k==='tr') d.pR.tl=d.pL.tr;
       else if(k==='bl2') d.pR.br=d.pL.bl; else if(k==='br') d.pR.bl=d.pL.br;
       else if(k==='op') d.pR.op=d.pL.op; else if(k==='yy') d.pR.y=d.pL.y;
       updateUI(d);
    } else {
       const val = (el.id.includes('op')) ? (el.value/100).toFixed(2) : el.value;
       const span = document.getElementById('v'+el.id); if(span) span.textContent = val;
    }
    render();
  };
});

const bc=document.getElementById('btns');
EXPRS.forEach((ex,i)=>{
  const b=document.createElement('button'); b.className='btn'; b.id='b'+i; b.textContent=ex.n;
  b.onclick=()=>select(i); bc.appendChild(b);
});

window.onload = () => { 
  const lastIdx = localStorage.getItem(DB_KEY + '_idx');
  select(lastIdx ? parseInt(lastIdx) : 0); 
};

function copyCode(){ 
  navigator.clipboard.writeText(document.getElementById('codeout').textContent);
  const b = document.querySelector('button[onclick="copyCode()"]');
  b.textContent = "Copiado!"; setTimeout(()=>b.textContent="Copiar C++", 1000);
}
</script>
</body>
